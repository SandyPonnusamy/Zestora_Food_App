<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zestora — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B1B17;
    --paper:#FFF7EC;
    --card:#FFFFFF;
    --chili:#FF4D3D;
    --chili-dark:#E0331F;
    --gold:#FFB627;
    --teal:#1B998B;
    --line: rgba(43,27,23,0.10);
    --muted: rgba(43,27,23,0.6);
    --shadow: 0 14px 30px rgba(43,27,23,0.10);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ color:inherit; text-decoration:none; }
  ul{ margin:0; padding:0; list-style:none; }
  a:focus-visible, label:focus-visible, input:focus-visible, button:focus-visible{
    outline: 3px solid var(--chili-dark);
    outline-offset: 2px;
  }

  /* ================= NAVBAR ================= */
  .navbar{
    position: sticky;
    top:0;
    z-index: 100;
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 16px 40px;
    background: var(--ink);
    color: var(--paper);
  }
  .logo{
    font-family:'Archivo Black', sans-serif;
    font-size: 1.55rem;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo .dot{ color: var(--gold); }
  .nav-links{
    display:flex;
    align-items:center;
    gap: 30px;
  }
  .nav-links a{
    font-weight:600;
    font-size: 0.95rem;
    opacity:0.92;
  }
  .nav-cta{
    background: var(--chili);
    color: #fff !important;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight:700;
    font-size: 0.9rem;
    box-shadow: 0 6px 16px rgba(255,77,61,0.35);
  }
  .nav-cta:hover{ background: var(--chili-dark); }

  /* ================= LOGIN HERO STRIP ================= */
  .login-hero{
    position:relative;
    background: linear-gradient(135deg, var(--ink) 0%, #45291f 60%, var(--chili-dark) 130%);
    color: var(--paper);
    padding: 48px 40px 42px;
    overflow:hidden;
    text-align:center;
  }
  .login-hero::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:280px; height:280px;
    background: radial-gradient(circle, rgba(255,182,39,0.3), transparent 70%);
  }
  .login-hero-inner{
    position:relative;
    z-index:2;
  }
  .login-hero h1{
    font-family:'Archivo Black', sans-serif;
    font-size: clamp(1.7rem, 3.4vw, 2.4rem);
    margin: 0 0 10px;
  }
  .login-hero h1 em{ font-style:normal; color: var(--gold); }
  .login-hero p{
    font-size: 0.96rem;
    opacity:0.85;
    margin:0;
  }

  /* ================= MAIN ================= */
  main{
    max-width: 460px;
    margin: 0 auto;
    padding: 44px 20px 100px;
  }

  .form-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 36px 36px 32px;
  }
  .form-card-head{
    text-align:center;
    margin-bottom: 28px;
  }
  .form-card-head .icon-badge{
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255,77,61,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    margin: 0 auto 14px;
  }
  .form-card-head .icon-badge svg{
    width: 26px;
    height: 26px;
    color: var(--chili);
  }
  .form-card-head h2{
    font-family:'Archivo Black', sans-serif;
    font-size: 1.3rem;
    margin: 0 0 6px;
  }
  .form-card-head p{
    font-size: 0.86rem;
    color: var(--muted);
    margin:0;
  }

  .field-group{
    margin-bottom: 20px;
  }
  .field-group label{
    display:block;
    font-size: 0.82rem;
    font-weight:700;
    color: var(--ink);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .input-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }
  .input-wrap svg{
    position:absolute;
    left: 14px;
    width: 17px;
    height: 17px;
    color: var(--chili);
    flex-shrink:0;
  }
  .input-wrap input{
    width:100%;
    padding: 12px 14px 12px 40px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family:'Inter', sans-serif;
    font-size: 0.92rem;
    color: var(--ink);
    background: var(--paper);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input-wrap input:focus{
    border-color: var(--chili);
    box-shadow: 0 0 0 3px rgba(255,77,61,0.12);
    outline:none;
  }
  .input-wrap input::placeholder{ color: rgba(43,27,23,0.4); }

  .toggle-pass{
    position:absolute;
    right: 14px;
    background:none;
    border:none;
    cursor:pointer;
    color: var(--muted);
    padding: 0;
    display:flex;
    align-items:center;
  }
  .toggle-pass svg{ width:17px; height:17px; }

  .row-between{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin: -8px 0 22px;
    font-size: 0.82rem;
  }
  .remember-me{
    display:flex;
    align-items:center;
    gap: 7px;
    color: var(--muted);
    font-weight:500;
  }
  .remember-me input{
    width:15px;
    height:15px;
    accent-color: var(--chili);
    cursor:pointer;
  }
  .forgot-link{
    color: var(--chili);
    font-weight:700;
  }
  .forgot-link:hover{ color: var(--chili-dark); text-decoration:underline; }

  .submit-btn{
    width:100%;
    border:none;
    background: var(--chili);
    color:#fff;
    font-weight:800;
    font-size: 0.96rem;
    padding: 14px 0;
    border-radius: 999px;
    cursor:pointer;
    box-shadow: 0 8px 18px rgba(255,77,61,0.3);
    transition: background .15s ease, transform .15s ease;
  }
  .submit-btn:hover{ background: var(--chili-dark); transform: translateY(-1px); }

  .divider{
    display:flex;
    align-items:center;
    gap: 12px;
    margin: 24px 0 18px;
  }
  .divider::before,
  .divider::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--line);
  }
  .divider span{
    font-size: 0.78rem;
    color: var(--muted);
    font-weight:600;
  }

  .signup-redirect{
    text-align:center;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .signup-redirect a{
    color: var(--chili);
    font-weight:700;
  }
  .signup-redirect a:hover{ color: var(--chili-dark); text-decoration:underline; }

  /* ================= FOOTER ================= */
  footer{
    background: var(--ink);
    color: rgba(255,247,236,0.6);
    padding: 24px 40px;
    text-align:center;
    font-size: 0.8rem;
  }

  /* ================= RESPONSIVE ================= */
  @media (max-width: 600px){
    .navbar{ padding: 14px 20px; }
    .login-hero{ padding: 38px 20px 34px; }
    main{ padding: 34px 16px 80px; }
    .form-card{ padding: 28px 22px 26px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a href="#" class="logo">Zest<span class="dot">ora</span></a>
  <ul class="nav-links">
    <li><a href="callRestaurantServlet">Home</a></li>
    <li><a href="register.html" class="nav-cta">Sign up</a></li>
  </ul>
</nav>

<header class="login-hero">
  <div class="login-hero-inner">
    <h1>Welcome back to <em>Zestora</em></h1>
    <p>Log in to continue ordering your favourite food.</p>
  </div>
</header>

<main>
  <div class="form-card">
    <div class="form-card-head">
      <div class="icon-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>
      </div>
      <h2>Log in to your account</h2>
      <p>Enter your email and password to continue.</p>
    </div>

    <form action="callLoginServlet" method="post">

      <div class="field-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="row-between">
        <label class="remember-me">
          <input type="checkbox" name="remember">
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn">Log in</button>

      <div class="divider"><span>OR</span></div>

      <p class="signup-redirect">Don't have an account? <a href="register.html">Sign up</a></p>

    </form>
  </div>
</main>

<footer>
  © 2026 Zestora. UI concept for a food delivery app.
</footer>


</body>
</html>
